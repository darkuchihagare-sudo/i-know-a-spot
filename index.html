<!DOCTYPE html>
<!--
  I Know A Spot — Supabase Edition

  SETUP: Run in Supabase → SQL Editor:

    CREATE TABLE public.spots (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
      name TEXT NOT NULL,
      description TEXT DEFAULT '',
      rating SMALLINT DEFAULT 0,
      latitude DOUBLE PRECISION NOT NULL,
      longitude DOUBLE PRECISION NOT NULL,
      created_at TIMESTAMPTZ DEFAULT NOW()
      -- To enable photos: ALTER TABLE public.spots ADD COLUMN photos TEXT[] DEFAULT '{}';
    );
    ALTER TABLE public.spots ENABLE ROW LEVEL SECURITY;
    CREATE POLICY "Users manage own spots" ON public.spots
      FOR ALL USING (auth.uid() = user_id)
      WITH CHECK (auth.uid() = user_id);

  Then in Supabase → Storage:
    1. Create bucket "spot-photos" (toggle Public ON)
    2. Under that bucket's Policies add two policies:
       INSERT: (auth.uid()::text = (storage.foldername(name))[1])
       DELETE: (auth.uid()::text = (storage.foldername(name))[1])
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#07060a" />
  <title>I Know A Spot</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:       #07060a;
      --bg-card:  #18150e;
      --bg-input: #221d12;
      --border:   #29231a;
      --bhi:      #4a3d1e;
      --gold:     #c8901c;
      --gmid:     #dfa030;
      --ghi:      #f2c045;
      --t1:       #ede2ca;
      --t2:       #8a7a62;
      --t3:       #4e4332;
      --danger:   #c0392b;
      --blue:     #007AFF;
      --sys: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; height: 100dvh; overflow: hidden;
      background: var(--bg); color: var(--t1);
      font-family: var(--sys);
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    #map { position: fixed; inset: 0; }

    /* AUTH SCREEN */
    #auth-screen {
      position: fixed; inset: 0; z-index: 6000;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    #auth-screen.gone { display: none; }
    .auth-inner { width: 100%; max-width: 360px; }
    .auth-logo-wrap {
      text-align: center; margin-bottom: 32px;
    }
    .auth-logo-icon { font-size: 52px; margin-bottom: 12px; }
    .auth-logo-title {
      font-size: 26px; font-weight: 700; letter-spacing: -.025em;
      color: var(--ghi); text-shadow: 0 0 22px rgba(242,192,69,.45);
    }
    .auth-logo-sub { font-size: 14px; color: var(--t2); margin-top: 6px; }
    .auth-tabs {
      display: flex; background: var(--bg-input);
      border-radius: 12px; padding: 3px; margin-bottom: 20px;
    }
    .auth-tab {
      flex: 1; padding: 10px; border: none; border-radius: 9px;
      background: transparent; color: var(--t2);
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: var(--sys); transition: background .18s, color .18s;
      touch-action: manipulation;
    }
    .auth-tab.active {
      background: var(--bg-card); color: var(--t1);
    }
    .auth-fields { display: flex; flex-direction: column; gap: 12px; }
    .auth-err {
      text-align: center; font-size: 13px; min-height: 20px;
      color: var(--danger); margin-top: 4px;
    }
    .auth-err.success { color: var(--ghi); }

    /* LOCATING SCREEN */
    #locating {
      position: fixed; inset: 0; z-index: 4000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity .55s ease;
    }
    #locating.gone { opacity: 0; pointer-events: none; }
    .loc-icon  { font-size: 48px; margin-bottom: 18px; }
    .loc-title { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 7px; }
    .loc-sub   { font-size: 15px; color: var(--t2); margin-bottom: 26px; }
    .loc-spin  {
      width: 24px; height: 24px;
      border: 2.5px solid rgba(255,255,255,.12);
      border-top-color: var(--ghi); border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HEADER */
    #hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      padding: env(safe-area-inset-top, 0) 18px 0;
      background: linear-gradient(to bottom, rgba(7,6,10,.95) 55%, transparent 100%);
      pointer-events: none;
    }
    #hdr-inner {
      height: 56px; display: flex; align-items: center;
      justify-content: space-between; pointer-events: auto;
    }
    #app-name {
      font-size: 19px; font-weight: 700; letter-spacing: -.025em;
      color: var(--ghi); text-shadow: 0 0 22px rgba(242,192,69,.45);
    }
    .hdr-right { display: flex; align-items: center; gap: 8px; }
    #spot-count {
      min-height: 36px; padding: 0 14px;
      background: rgba(24,21,14,.92); border: 1px solid var(--bhi);
      border-radius: 18px; font-size: 13px; font-weight: 600;
      color: var(--gmid); display: flex; align-items: center;
      touch-action: manipulation; cursor: pointer;
    }
    #spot-count:active { opacity: .65; }
    #user-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(24,21,14,.92); border: 1px solid var(--bhi);
      color: var(--t2); cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .18s, color .18s;
    }
    #user-btn:hover { border-color: var(--gold); color: var(--gmid); }
    #user-btn:active { opacity: .65; }

    /* BOTTOM BAR */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 890;
      padding: 10px 16px max(20px, env(safe-area-inset-bottom, 20px));
      background: linear-gradient(to top, rgba(7,6,10,.92) 55%, transparent 100%);
      display: flex; align-items: center; gap: 10px;
    }

    #add-btn {
      flex: 1; height: 64px; border: none; border-radius: 20px; cursor: pointer;
      background: linear-gradient(135deg, #d49520 0%, #f0b030 45%, #d49520 100%);
      color: #1a0d00; font-size: 15px; font-weight: 900;
      letter-spacing: .08em; text-transform: uppercase;
      font-family: var(--sys);
      box-shadow: 0 4px 24px rgba(210,149,28,.55), 0 1px 0 rgba(255,255,255,.18) inset;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      touch-action: manipulation;
      transition: transform .12s, box-shadow .12s;
    }
    #add-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 12px rgba(210,149,28,.4);
    }
    #add-btn-icon { font-size: 19px; }

    #locate-btn {
      width: 52px; height: 64px; border: 1px solid var(--bhi); border-radius: 16px;
      background: rgba(24,21,14,.92); color: var(--t1); font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; touch-action: manipulation; flex-shrink: 0;
      transition: transform .12s;
    }
    #locate-btn:active { transform: scale(0.92); }

    /* SHEET OVERLAY */
    .sov {
      position: fixed; inset: 0; z-index: 1200;
      background: rgba(0,0,0,.52);
      display: flex; flex-direction: column; justify-content: flex-end;
      opacity: 0; pointer-events: none; transition: opacity .26s;
    }
    .sov.on { opacity: 1; pointer-events: auto; }

    .sheet {
      width: 100%; background: var(--bg-card);
      border-top: 1px solid var(--bhi);
      border-radius: 20px 20px 0 0;
      max-height: 88dvh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
      transform: translateY(100%);
      transition: transform .4s cubic-bezier(.32,.72,0,1);
    }
    .sov.on .sheet { transform: translateY(0); }

    .drag-handle {
      width: 36px; height: 4px; background: var(--bhi);
      border-radius: 2px; margin: 12px auto 0; flex-shrink: 0;
    }

    .sh-title {
      font-size: 21px; font-weight: 700; letter-spacing: -.025em;
      padding: 16px 20px 4px;
    }
    .sh-sub {
      font-size: 14px; color: var(--t2); font-style: italic;
      padding: 0 20px 16px; line-height: 1.4;
    }

    /* FORM */
    .fg { padding: 0 20px; margin-bottom: 16px; }
    .flabel {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--t2); margin-bottom: 8px;
    }
    .finput, .ftextarea {
      width: 100%; background: var(--bg-input);
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 14px 16px; color: var(--t1);
      font-family: var(--sys); font-size: 16px;
      outline: none; -webkit-appearance: none;
      transition: border-color .2s;
    }
    .finput:focus, .ftextarea:focus { border-color: var(--gold); }
    .ftextarea { min-height: 96px; resize: none; line-height: 1.5; }
    .finput.err { border-color: var(--ghi); }

    /* PHOTO UPLOAD */
    .upload-zone {
      position: relative; border: 2px dashed var(--border);
      border-radius: 12px; padding: 20px 16px; text-align: center;
      cursor: pointer; touch-action: manipulation;
    }
    .upload-zone:active { border-color: var(--gold); background: rgba(200,144,28,.05); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon { font-size: 28px; margin-bottom: 6px; }
    .upload-txt  { font-size: 13px; color: var(--t2); }
    .previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .prev-item {
      position: relative; width: 72px; height: 72px;
      border-radius: 10px; overflow: hidden; border: 1.5px solid var(--border);
    }
    .prev-item img { width: 100%; height: 100%; object-fit: cover; }
    .prev-rm {
      position: absolute; top: 3px; right: 3px;
      width: 20px; height: 20px; background: rgba(0,0,0,.8);
      border: none; border-radius: 50%; cursor: pointer;
      color: #fff; font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }

    /* BUTTONS */
    .btn-row { display: flex; gap: 10px; padding: 0 20px; margin-top: 18px; }
    .btn {
      flex: 1; min-height: 52px; border: none; border-radius: 14px;
      font-family: var(--sys); font-size: 16px; font-weight: 600;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s, opacity .12s;
    }
    .btn:active { transform: scale(0.96); opacity: .8; }
    .btn:disabled { opacity: .5; pointer-events: none; }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gmid));
      color: #1a0d00;
    }
    .btn-sec {
      background: var(--bg-input); color: var(--t2);
      border: 1.5px solid var(--border);
    }
    .btn-del {
      background: rgba(192,57,43,.1); color: var(--danger);
      border: 1.5px solid rgba(192,57,43,.28);
      flex: none; padding: 0 20px;
    }
    .sh-gap { height: max(16px, env(safe-area-inset-bottom, 16px)); }

    /* RATING SHEET */
    .rate-grid { display: flex; flex-direction: column; gap: 8px; padding: 0 20px; }
    .rate-opt {
      display: flex; align-items: center; gap: 14px;
      min-height: 62px; padding: 14px 16px;
      background: var(--bg-input); border: 1.5px solid var(--border);
      border-radius: 14px; cursor: pointer; touch-action: manipulation;
    }
    .rate-opt:active { transform: scale(0.97); opacity: .85; }
    .rate-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .rate-name { font-size: 16px; font-weight: 600; color: var(--t1); }
    .rate-stars { font-size: 12px; color: var(--t3); margin-top: 3px; letter-spacing: 2px; }

    /* VIEW SHEET */
    .v-name {
      font-size: 26px; font-weight: 700; letter-spacing: -.025em;
      padding: 16px 20px 4px;
    }
    .v-meta {
      font-size: 12px; color: var(--t3); letter-spacing: .04em;
      padding: 0 20px 0;
    }
    .v-rate-section {
      padding: 14px 20px; border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border); margin: 14px 0;
    }
    .v-rate-lbl {
      font-size: 10px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--t3); margin-bottom: 10px;
    }
    .v-rate-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .v-ropt {
      flex: 1; height: 46px; border: 1.5px solid var(--border);
      border-radius: 10px; background: var(--bg-input);
      font-family: var(--sys); font-size: 17px; font-weight: 700;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s;
    }
    .v-ropt:active { transform: scale(0.91); }
    .v-badge { font-size: 14px; font-weight: 600; min-height: 18px; }
    .v-vibe {
      font-size: 16px; color: var(--t2); line-height: 1.75;
      font-style: italic; padding: 0 20px 16px;
      font-family: Georgia, serif;
    }
    .gallery {
      display: grid; gap: 3px; padding: 0 20px; margin-bottom: 16px;
      grid-template-columns: repeat(3, 1fr);
    }
    .gallery.g1 { grid-template-columns: 1fr; }
    .gallery.g2 { grid-template-columns: 1fr 1fr; }
    .gphoto {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-radius: 8px; cursor: zoom-in; touch-action: manipulation;
    }
    .gallery.g1 .gphoto { aspect-ratio: 4/3; border-radius: 12px; }

    /* SPOTS LIST SHEET */
    .list-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 14px; border-bottom: 1px solid var(--border);
    }
    .list-hdr-title { font-size: 18px; font-weight: 700; letter-spacing: -.02em; }
    .list-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-input); border: none; cursor: pointer;
      color: var(--t2); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }
    .list-close:active { opacity: .6; }
    #plist { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .pitem {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      min-height: 64px; cursor: pointer; touch-action: manipulation;
    }
    .pitem:active { background: rgba(255,255,255,.04); }
    .pitem-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pitem-name { font-size: 16px; font-weight: 600; color: var(--t1); margin-bottom: 3px; }
    .pitem-badge{ font-size: 13px; }
    .empty-list {
      text-align: center; padding: 52px 24px;
      color: var(--t3); font-size: 15px; line-height: 1.9;
    }

    /* LIGHTBOX */
    #lb {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(0,0,0,.97);
      display: none; align-items: center; justify-content: center;
      touch-action: manipulation;
    }
    #lb.on { display: flex; }
    #lb img { max-width: 100%; max-height: 92dvh; object-fit: contain; }

    /* TOAST */
    #toast {
      position: fixed; z-index: 2000;
      bottom: max(108px, calc(env(safe-area-inset-bottom, 0px) + 96px));
      left: 50%; transform: translateX(-50%) translateY(14px);
      background: rgba(28,24,16,.97); color: var(--t1);
      border: 1px solid var(--bhi); border-radius: 20px;
      padding: 10px 20px; font-size: 14px; font-weight: 500;
      opacity: 0; pointer-events: none; white-space: nowrap;
      transition: opacity .28s, transform .28s;
    }
    #toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* USER LOCATION DOT */
    .uloc { position: relative; width: 22px; height: 22px; }
    .uloc-ring {
      position: absolute; inset: 0;
      background: rgba(0,122,255,.22); border-radius: 50%;
      animation: ring 2.2s ease-out infinite;
    }
    .uloc-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 13px; height: 13px;
      background: var(--blue); border-radius: 50%;
      border: 2.5px solid #fff;
      box-shadow: 0 2px 8px rgba(0,122,255,.55);
      z-index: 1;
    }
    @keyframes ring {
      0%   { transform: scale(1);   opacity: .9; }
      80%  { transform: scale(3.4); opacity: 0; }
      100% { opacity: 0; }
    }

    /* SPOT MARKER */
    .pin-outer { display: flex; flex-direction: column; align-items: center; }
    .pin-body   { width: 26px; height: 36px; position: relative; }
    .pin-shape  {
      width: 18px; height: 18px; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg); position: absolute; top: 0; left: 4px;
    }
    .pin-shape::after {
      content: ''; width: 6px; height: 6px; background: rgba(0,0,0,.28);
      border-radius: 50%; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    .pin-shadow {
      width: 12px; height: 4px; background: rgba(0,0,0,.38);
      border-radius: 50%; position: absolute; bottom: 0; left: 7px; filter: blur(2px);
    }
    .pin-label {
      margin-top: 3px; font-size: 9px; padding: 2px 7px;
      border-radius: 7px; border: 1px solid rgba(255,255,255,.1);
      background: rgba(12,10,6,.92); white-space: nowrap;
      letter-spacing: .04em; line-height: 1.5;
    }
    .pin-new { animation: pinPop .45s cubic-bezier(.34,1.56,.64,1) forwards; }
    @keyframes pinPop {
      from { transform: scale(0) translateY(10px); opacity: 0; }
      to   { transform: scale(1) translateY(0);    opacity: 1; }
    }
    .pin-temp .pin-shape {
      background: radial-gradient(circle at 35% 35%, #999 0%, #666 100%) !important;
      animation: tPulse 1.4s ease-in-out infinite;
    }
    @keyframes tPulse {
      0%,100% { box-shadow: 0 0 6px rgba(150,150,150,.3); }
      50%      { box-shadow: 0 0 16px rgba(150,150,150,.7); }
    }

    /* LEAFLET OVERRIDES */
    .leaflet-control-zoom {
      border: 1px solid rgba(0,0,0,.18) !important;
      border-radius: 12px !important; overflow: hidden;
    }
    .leaflet-control-zoom a {
      width: 40px !important; height: 40px !important;
      line-height: 40px !important; font-size: 20px !important;
      background: rgba(22,18,12,.92) !important;
      color: var(--gmid) !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .leaflet-control-zoom a:last-child { border-bottom: none !important; }
    .leaflet-bottom.leaflet-right {
      bottom: max(112px, calc(env(safe-area-inset-bottom, 0px) + 100px)) !important;
      right: 14px !important;
    }
    .leaflet-control-attribution {
      font-size: 9px !important; background: rgba(7,6,10,.65) !important;
      color: var(--t3) !important;
    }
    .leaflet-control-attribution a { color: var(--t3) !important; }
    ::-webkit-scrollbar { display: none; }

    /* FRIENDS BUTTON + BADGE */
    #friends-btn {
      position: relative;
      width: 52px; height: 64px; border: 1px solid var(--bhi); border-radius: 16px;
      background: rgba(24,21,14,.92); color: var(--t1); font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; touch-action: manipulation; flex-shrink: 0;
      transition: transform .12s;
    }
    #friends-btn:active { transform: scale(0.92); }
    #friends-badge {
      position: absolute; top: -5px; right: -5px;
      min-width: 18px; height: 18px; padding: 0 4px;
      border-radius: 9px; background: var(--gold); color: #1a0d00;
      font-size: 10px; font-weight: 800; letter-spacing: 0;
      display: none; align-items: center; justify-content: center;
    }
    #friends-badge.on { display: flex; }

    /* FRIENDS SHEET */
    .f-section {
      padding: 14px 20px 6px;
      font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--t3);
    }
    .f-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px; border-bottom: 1px solid var(--border);
      min-height: 56px;
    }
    .f-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg-input); border: 1.5px solid var(--bhi);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: var(--gmid);
      flex-shrink: 0; text-transform: uppercase; letter-spacing: 0;
    }
    .f-name { font-size: 15px; font-weight: 600; color: var(--t1); flex: 1; min-width: 0; }
    .f-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .f-btn {
      padding: 0 13px; height: 34px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      touch-action: manipulation; font-family: var(--sys);
      border: 1.5px solid; white-space: nowrap;
      transition: opacity .12s; display: flex; align-items: center;
    }
    .f-btn:active { opacity: .65; }
    .f-btn-add    { border-color: var(--bhi); color: var(--gmid); background: rgba(200,144,28,.08); }
    .f-btn-sent   { border-color: var(--border); color: var(--t3); background: transparent; pointer-events: none; }
    .f-btn-accept { border-color: #27ae60; color: #27ae60; background: rgba(39,174,96,.08); }
    .f-btn-decline{ border-color: var(--border); color: var(--t2); background: transparent; }
    .f-btn-remove { border-color: var(--border); color: var(--t3); background: transparent; }
    .f-empty {
      text-align: center; padding: 36px 24px;

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── SUPABASE ─────────────────────────────────────────────────
const SUPABASE_URL = 'https://bqxkbfrljuuweqwbdotz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxeGtiZnJsanV1d2Vxd2Jkb3R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MTY1MTcsImV4cCI6MjA5NDQ5MjUxN30.AsNTkTEXcRzgn3Z_6QmJQQVFnHUYc5xAtbkI2OrwvCU';
const BUCKET = 'spot-photos';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

function photoSrc(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

// ── RATINGS ──────────────────────────────────────────────────
const RATINGS = {
  0: { name:'Unrated',       hi:'#aaa',    base:'#777',    glow:'rgba(170,170,170,.38)', ring:'rgba(170,170,170,.18)', text:'#999',    stars:'' },
  1: { name:'Just a Place',  hi:'#c0c0c0', base:'#888',    glow:'rgba(190,190,190,.42)', ring:'rgba(190,190,190,.2)',  text:'#aaa',    stars:'★' },
  2: { name:'Has Potential', hi:'#74b9e8', base:'#2e86c1', glow:'rgba(52,152,219,.5)',   ring:'rgba(52,152,219,.22)', text:'#5aabee', stars:'★★' },
  3: { name:'Good Spot',     hi:'#f5a623', base:'#d17b10', glow:'rgba(241,152,30,.5)',   ring:'rgba(241,152,30,.22)', text:'#f5a623', stars:'★★★' },
  4: { name:'Great Spot',    hi:'#d7a8e8', base:'#8e44ad', glow:'rgba(142,68,173,.5)',   ring:'rgba(142,68,173,.22)', text:'#c07de0', stars:'★★★★' },
  5: { name:'THE Spot',      hi:'#f2c045', base:'#c8901c', glow:'rgba(242,192,69,.55)',  ring:'rgba(242,192,69,.22)', text:'#f2c045', stars:'★★★★★' },
};

// ── FRIEND PIN COLOUR ────────────────────────────────────────
const FPIN = { hi:'#b8daf5', base:'#4a90d9', glow:'rgba(74,144,217,.5)', ring:'rgba(74,144,217,.25)', text:'#8bbce8' };

// ── STATE ────────────────────────────────────────────────────
let spots = [], markers = {}, pendingLL = null, pendingPics = [];
let activeId = null, ratingId = null, tempMark = null;
let curLoc = null, locMark = null, locCircle = null;
let currentUser = null;
let allFriendships = [], friendProfiles = {};

// ── MAP ──────────────────────────────────────────────────────
const map = L.map('map', { center:[25,15], zoom:3, zoomControl:false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

map.on('click', e => {
  if (document.querySelector('.sov.on')) return;
  openAdd(e.latlng, false);
});

// ── GPS ──────────────────────────────────────────────────────
function initGPS() {
  if (!navigator.geolocation) { hideLocating('GPS unavailable — tap map to add spots.'); return; }
  navigator.geolocation.getCurrentPosition(
    p => {
      curLoc = { lat:p.coords.latitude, lng:p.coords.longitude };
      map.setView([curLoc.lat, curLoc.lng], 15, { animate:false });
      putLocDot(p); hideLocating();
    },
    () => hideLocating('Location denied.'),
    { enableHighAccuracy:true, timeout:9000 }
  );
  navigator.geolocation.watchPosition(
    p => { curLoc = { lat:p.coords.latitude, lng:p.coords.longitude }; putLocDot(p); },
    () => {},
    { enableHighAccuracy:true, maximumAge:4000 }
  );
  setTimeout(() => hideLocating(), 7000);
}

function putLocDot(p) {
  const ll=[p.coords.latitude, p.coords.longitude], acc=p.coords.accuracy||25;
  if (!locMark) {
    const icon=L.divIcon({className:'',
      html:'<div class="uloc"><div class="uloc-ring"></div><div class="uloc-dot"></div></div>',
      iconSize:[22,22], iconAnchor:[11,11]
    });
    locMark=L.marker(ll,{icon,zIndexOffset:-200}).addTo(map);
    locCircle=L.circle(ll,{radius:acc,color:'#007AFF',opacity:.22,weight:1,fillColor:'#007AFF',fillOpacity:.06}).addTo(map);
  } else { locMark.setLatLng(ll); locCircle.setLatLng(ll).setRadius(acc); }
}

function hideLocating(msg) {
  document.getElementById('locating').classList.add('gone');
  if (msg) setTimeout(()=>toast(msg), 650);
}

function centerOnUser() {
  if (curLoc) map.flyTo([curLoc.lat,curLoc.lng], Math.max(map.getZoom(),16), {duration:.8});
  else toast('Still finding your location…');
}

// ── ADD SPOT HERE ────────────────────────────────────────────
function addSpotHere() {
  if (!curLoc) { toast('Still finding your location…'); return; }
  openAdd(L.latLng(curLoc.lat, curLoc.lng), true);
}

// ── ICONS ────────────────────────────────────────────────────
function makeIcon(rating=0, cls='') {
  const r=RATINGS[rating]||RATINGS[0];
  const pin=`background:radial-gradient(circle at 35% 35%,${r.hi} 0%,${r.base} 100%);box-shadow:0 0 0 2px ${r.ring},0 0 12px ${r.glow}`;
  return L.divIcon({
    className:'',
    html:`<div class="pin-outer ${cls}"><div class="pin-body"><div class="pin-shape" style="${pin}"></div><div class="pin-shadow"></div></div><div class="pin-label" style="color:${r.text};border-color:${r.ring}">${r.name}</div></div>`,
    iconSize:[26,56], iconAnchor:[13,36]
  });
}

function makeFriendIcon(rating=0, cls='') {
  const rName=RATINGS[rating]?.name||'';
  const pin=`background:radial-gradient(circle at 35% 35%,${FPIN.hi} 0%,${FPIN.base} 100%);box-shadow:0 0 0 2px ${FPIN.ring},0 0 12px ${FPIN.glow}`;
  return L.divIcon({
    className:'',
    html:`<div class="pin-outer ${cls}"><div class="pin-body"><div class="pin-shape" style="${pin}"></div><div class="pin-shadow"></div></div><div class="pin-label" style="color:${FPIN.text};border-color:${FPIN.ring}">${rName}</div></div>`,
    iconSize:[26,56], iconAnchor:[13,36]
  });
}

function tempIcon() {
  return L.divIcon({
    className:'',
    html:`<div class="pin-outer pin-temp"><div class="pin-body"><div class="pin-shape"></div><div class="pin-shadow"></div></div><div class="pin-label" style="color:#888">…</div></div>`,
    iconSize:[26,56], iconAnchor:[13,36]
  });
}

function addMarker(s, isNew=false) {
  const isOwn=s.user_id===currentUser?.id;
  const icon=isOwn?makeIcon(s.rating||0,isNew?'pin-new':''):makeFriendIcon(s.rating||0,isNew?'pin-new':'');
  const m=L.marker([s.latitude,s.longitude],{icon})
    .addTo(map).on('click',()=>openView(s.id));
  markers[s.id]=m;
}

function refreshMarker(id) {
  const s=spots.find(x=>x.id===id); if (!s||!markers[id]) return;
  const isOwn=s.user_id===currentUser?.id;
  markers[id].setIcon(isOwn?makeIcon(s.rating||0):makeFriendIcon(s.rating||0));
}

// ── ADD SHEET ────────────────────────────────────────────────
function openAdd(ll, fromBtn=false) {
  pendingLL=ll; pendingPics=[];
  document.getElementById('inp-name').value='';
  document.getElementById('inp-description').value='';
  document.getElementById('previews').innerHTML='';
  document.getElementById('file-inp').value='';
  document.getElementById('inp-name').classList.remove('err');
  const sub=document.getElementById('add-sub');
  if (fromBtn) {
    sub.textContent='Your current location';
  } else {
    sub.textContent=`${Math.abs(ll.lat).toFixed(4)}°${ll.lat>=0?'N':'S'}, ${Math.abs(ll.lng).toFixed(4)}°${ll.lng>=0?'E':'W'}`;
    if (tempMark) map.removeLayer(tempMark);
    tempMark=L.marker([ll.lat,ll.lng],{icon:tempIcon()}).addTo(map);
  }
  document.getElementById('add-ov').classList.add('on');
  setTimeout(()=>document.getElementById('inp-name').focus(), 420);
}

function closeAdd() {
  document.getElementById('add-ov').classList.remove('on');
  if (tempMark) { map.removeLayer(tempMark); tempMark=null; }
  pendingLL=null; pendingPics=[];
}

// ── PHOTOS ───────────────────────────────────────────────────
async function onFiles(e) {
  for (const f of e.target.files) {
    if (pendingPics.length>=5) break;
    pendingPics.push(await compress(f));
    renderPics();
  }
  e.target.value='';
}

function renderPics() {
  document.getElementById('previews').innerHTML=pendingPics.map((pic,i)=>`
    <div class="prev-item">
      <img src="${pic.dataUrl}"/>
      <button class="prev-rm" onclick="rmPic(${i})">✕</button>
    </div>`).join('');
}

function rmPic(i) { pendingPics.splice(i,1); renderPics(); }

function compress(file, maxW=920, q=.76) {
  return new Promise(res => {
    const rd=new FileReader();
    rd.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if (w>maxW) { h=Math.round(h*maxW/w); w=maxW; }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(blob=>res({dataUrl:c.toDataURL('image/jpeg',q),blob}),'image/jpeg',q);
      };
      img.src=ev.target.result;
    };
    rd.readAsDataURL(file);
  });
}

// ── SAVE ─────────────────────────────────────────────────────
async function saveSpot() {
  const name=document.getElementById('inp-name').value.trim();
  if (!name) {
    const el=document.getElementById('inp-name');
    el.classList.add('err'); el.focus();
    setTimeout(()=>el.classList.remove('err'),1400);
    return;
  }

  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Saving…';

  const { data:row, error:insErr } = await sb.from('spots').insert({
    user_id: currentUser.id,
    name,
    description: document.getElementById('inp-description').value.trim(),
    rating: 1,
    latitude: pendingLL.lat,
    longitude: pendingLL.lng
  }).select().single();

  if (insErr) {
    btn.disabled=false; btn.textContent='Save Spot';
    toast('Save failed — ' + insErr.message);
    return;
  }

  btn.disabled=false; btn.textContent='Save Spot';

  spots.push(row);
  if (tempMark) { map.removeLayer(tempMark); tempMark=null; }
  addMarker(row, true);
  updateCount(); renderList();
  closeAdd(); openRate(row.id);
}

// ── RATE SHEET ───────────────────────────────────────────────
function openRate(id) {
  ratingId=id;
  const s=spots.find(x=>x.id===id);
  document.getElementById('rate-name').textContent=s?`"${s.name}"` : '';
  document.getElementById('rate-grid').innerHTML=[1,2,3,4,5].map(n=>{
    const r=RATINGS[n];
    return `<div class="rate-opt" onclick="applyRate(${n})">
      <div class="rate-dot" style="background:${r.base};box-shadow:0 0 7px ${r.glow}"></div>
      <div><div class="rate-name">${r.name}</div><div class="rate-stars">${r.stars||'—'}</div></div>
    </div>`;
  }).join('');
  document.getElementById('rate-ov').classList.add('on');
}

async function applyRate(n) {
  if (!ratingId) return;
  const s=spots.find(x=>x.id===ratingId); if (!s) return;
  const { error } = await sb.from('spots').update({rating:n}).eq('id',ratingId);
  if (error) { toast('Failed to save rating'); return; }
  s.rating=n;
  refreshMarker(ratingId); renderList();
  if (activeId===ratingId) renderViewRating(s);
  closeRate(); toast(RATINGS[n].name);
}

function skipRate()  { closeRate(); }
function closeRate() { document.getElementById('rate-ov').classList.remove('on'); ratingId=null; }

// ── VIEW SHEET ───────────────────────────────────────────────
function openView(id) {
  const s=spots.find(x=>x.id===id); if (!s) return;
  activeId=id;
  const isOwn=s.user_id===currentUser?.id;
  document.getElementById('v-name').textContent=s.name;
  const lbl=document.getElementById('v-friend-label');
  if (!isOwn) {
    const nick=friendProfiles[s.user_id]?.nickname||'Friend';
    lbl.textContent=`by @${nick}`; lbl.style.display='';
  } else { lbl.style.display='none'; }
  const d=new Date(s.created_at);
  document.getElementById('v-meta').textContent=
    `${d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}  ·  `+
    `${Math.abs(s.latitude).toFixed(4)}°${s.latitude>=0?'N':'S'} ${Math.abs(s.longitude).toFixed(4)}°${s.longitude>=0?'E':'W'}`;
  renderViewRating(s);
  const descEl=document.getElementById('v-description');
  descEl.textContent=s.description||''; descEl.style.display=s.description?'':'none';
  document.getElementById('v-gallery').innerHTML='';
  document.getElementById('del-btn').style.display=isOwn?'':'none';
  document.getElementById('view-ov').classList.add('on');
}

function renderViewRating(s) {
  const isOwn=s.user_id===currentUser?.id;
  const cur=s.rating||0;
  document.getElementById('v-rate-row').innerHTML=[1,2,3,4,5].map(n=>{
    const r=RATINGS[n], active=n===cur;
    const st=active
      ?`border-color:${r.text};background:rgba(${rgb(r.base)},.18);color:${r.text}`
      :`color:${r.text}`;
    return isOwn
      ?`<button class="v-ropt" style="${st}" onclick="rateInline(${n})">${n}</button>`
      :`<button class="v-ropt" style="${st};opacity:.45;pointer-events:none">${n}</button>`;
  }).join('');
  const cr=RATINGS[cur], el=document.getElementById('v-badge');
  el.textContent=cur>0?`${cr.stars}  ${cr.name}`:'Not yet rated';
  el.style.color=cur>0?cr.text:'var(--t3)';
}

async function rateInline(n) {
  if (!activeId) return;
  const s=spots.find(x=>x.id===activeId); if (!s||s.user_id!==currentUser?.id) return;
  const newRating=(s.rating===n)?0:n;
  const { error } = await sb.from('spots').update({rating:newRating}).eq('id',activeId);
  if (error) { toast('Failed to update rating'); return; }
  s.rating=newRating;
  refreshMarker(activeId); renderList(); renderViewRating(s);
}

function closeView() { document.getElementById('view-ov').classList.remove('on'); activeId=null; }

// ── DELETE ───────────────────────────────────────────────────
async function delSpot() {
  if (!activeId) return;
  const id=activeId;
  const s=spots.find(x=>x.id===id);
  if (!s||s.user_id!==currentUser?.id) return;
  if (!confirm('Remove this spot?')) return;
  const { error } = await sb.from('spots').delete().eq('id',id);
  if (error) { toast('Failed to delete spot'); return; }
  spots=spots.filter(x=>x.id!==id);
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  updateCount(); renderList(); closeView();
}

// ── LIGHTBOX ─────────────────────────────────────────────────
function openLb(i) {
  const s=spots.find(x=>x.id===activeId); if (!s) return;
  if (!s.photos?.length) return;
  document.getElementById('lb-img').src=photoSrc(s.photos[i]);
  document.getElementById('lb').classList.add('on');
}
function closeLb() { document.getElementById('lb').classList.remove('on'); }

// ── LIST SHEET ───────────────────────────────────────────────
function openList()  { renderList(); document.getElementById('list-ov').classList.add('on'); }
function closeList() { document.getElementById('list-ov').classList.remove('on'); }
function listBgClick(e) { if (!document.getElementById('list-sheet').contains(e.target)) closeList(); }

function renderList() {
  const el=document.getElementById('plist');
  if (!spots.length) { el.innerHTML='<div class="empty-list">No spots yet.<br>Tap ADD SPOT HERE to mark your first.</div>'; return; }
  el.innerHTML=[...spots].reverse().map(s=>{
    const isOwn=s.user_id===currentUser?.id;
    const r=RATINGS[s.rating||0];
    const dotBg=isOwn?r.base:FPIN.base, dotGlow=isOwn?r.glow:FPIN.glow;
    const sub=isOwn?r.name:`@${friendProfiles[s.user_id]?.nickname||'Friend'}`;
    const subColor=isOwn?r.text:FPIN.text;
    return `<div class="pitem" onclick="flyTo('${s.id}')">
      <div class="pitem-dot" style="background:${dotBg};box-shadow:0 0 5px ${dotGlow}"></div>
      <div><div class="pitem-name">${esc(s.name)}</div><div class="pitem-badge" style="color:${subColor}">${sub}</div></div>
    </div>`;
  }).join('');
}

function flyTo(id) {
  const s=spots.find(x=>x.id===id); if (!s) return;
  closeList();
  map.flyTo([s.latitude,s.longitude], Math.max(map.getZoom(),15), {duration:1.0});
  setTimeout(()=>openView(id), 1150);
}

// ── OVERLAYS ─────────────────────────────────────────────────
function bgDismiss(e, type) {
  const ids={add:'add-modal',rate:'rate-modal',view:'view-modal'};
  if (!document.getElementById(ids[type]).contains(e.target)) {
    if (type==='add') closeAdd();
    else if (type==='rate') skipRate();
    else closeView();
  }
}

// ── TOAST ────────────────────────────────────────────────────
let toastT;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),2500);
}

// ── HELPERS ──────────────────────────────────────────────────
function updateCount() {
  const n=spots.filter(s=>s.user_id===currentUser?.id).length;
  document.getElementById('spot-count').textContent=`${n} spot${n!==1?'s':''}`;
}
function esc(s) { const d=document.createElement('div'); d.appendChild(document.createTextNode(s||'')); return d.innerHTML; }
function rgb(hex) { const h=hex.replace('#',''),n=parseInt(h,16); return `${(n>>16)&255},${(n>>8)&255},${n&255}`; }

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key!=='Escape') return;
  if (document.getElementById('lb').classList.contains('on'))         { closeLb();      return; }
  if (document.getElementById('view-ov').classList.contains('on'))    { closeView();    return; }
  if (document.getElementById('rate-ov').classList.contains('on'))    { skipRate();     return; }
  if (document.getElementById('add-ov').classList.contains('on'))     { closeAdd();     return; }
  if (document.getElementById('list-ov').classList.contains('on'))    { closeList();    return; }
  if (document.getElementById('friends-ov').classList.contains('on')) { closeFriends(); return; }
});

// ── AUTH ─────────────────────────────────────────────────────
let authMode='login';

function showAuthScreen() { document.getElementById('auth-screen').classList.remove('gone'); }
function hideAuthScreen()  { document.getElementById('auth-screen').classList.add('gone'); }

function switchTab(mode) {
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-signup').classList.toggle('active', mode==='signup');
  document.getElementById('auth-btn').textContent=mode==='login'?'Sign In':'Create Account';
  document.getElementById('auth-nickname').style.display=mode==='signup'?'':'none';
  document.getElementById('auth-nickname').value='';
  const errEl=document.getElementById('auth-err');
  errEl.textContent=''; errEl.className='auth-err';
}

async function doAuth() {
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const errEl=document.getElementById('auth-err');
  const btn=document.getElementById('auth-btn');
  const nickname=document.getElementById('auth-nickname').value.trim();
  if (!email||!password) { errEl.textContent='Please fill in all fields'; return; }
  if (authMode==='signup'&&!nickname) { errEl.textContent='Please enter a nickname'; return; }
  btn.disabled=true; btn.textContent='…'; errEl.textContent=''; errEl.className='auth-err';
  const result=authMode==='login'
    ? await sb.auth.signInWithPassword({email,password})
    : await sb.auth.signUp({email,password,options:{data:{nickname}}});
  btn.disabled=false;
  btn.textContent=authMode==='login'?'Sign In':'Create Account';
  if (result.error) {
    errEl.textContent=result.error.message;
  } else if (authMode==='signup'&&result.data?.user&&!result.data?.session) {
    errEl.className='auth-err success';
    errEl.textContent='Check your email to confirm your account!';
  }
}

async function doSignOut() {
  await sb.auth.signOut();
}

// ── FRIENDS ──────────────────────────────────────────────────
async function loadFriendData() {
  if (!currentUser) return;
  const { data:fships } = await sb.from('friendships')
    .select('*')
    .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`);
  allFriendships = fships || [];

  const otherIds = [...new Set(allFriendships.map(f =>
    f.user_id===currentUser.id ? f.friend_id : f.user_id
  ))];
  if (otherIds.length > 0) {
    const { data:profs } = await sb.from('profiles').select('id,nickname').in('id', otherIds);
    friendProfiles = Object.fromEntries((profs||[]).map(p=>[p.id,p]));
  } else {
    friendProfiles = {};
  }
  updateFriendsBadge();
}

function updateFriendsBadge() {
  const count = allFriendships.filter(f=>f.friend_id===currentUser?.id&&f.status==='pending').length;
  const el = document.getElementById('friends-badge');
  el.textContent = count || '';
  el.classList.toggle('on', count > 0);
}

async function openFriends() {
  await loadFriendData();
  document.getElementById('friend-search').value='';
  document.getElementById('friend-search-results').innerHTML='';
  renderFriendsSheet();
  document.getElementById('friends-ov').classList.add('on');
}
function closeFriends() { document.getElementById('friends-ov').classList.remove('on'); }
function friendsBgClick(e) { if (!document.getElementById('friends-sheet').contains(e.target)) closeFriends(); }

function renderFriendsSheet() {
  const incoming = allFriendships.filter(f=>f.friend_id===currentUser.id&&f.status==='pending');
  const accepted = allFriendships.filter(f=>f.status==='accepted');

  const pendingEl = document.getElementById('pending-section');
  pendingEl.innerHTML = incoming.length ? `
    <div class="f-section">Pending Requests (${incoming.length})</div>
    ${incoming.map(f=>{
      const nick=friendProfiles[f.user_id]?.nickname||'…';
      return `<div class="f-item">
        <div class="f-avatar">${nick[0].toUpperCase()}</div>
        <div class="f-name">@${esc(nick)}</div>
        <div class="f-actions">
          <button class="f-btn f-btn-accept" onclick="acceptFriendRequest('${f.id}')">Accept</button>
          <button class="f-btn f-btn-decline" onclick="declineOrRemoveFriend('${f.id}')">Decline</button>
        </div>
      </div>`;
    }).join('')}` : '';

  const friendsEl = document.getElementById('friends-list-section');
  if (accepted.length) {
    friendsEl.innerHTML = `
      <div class="f-section">Friends (${accepted.length})</div>
      ${accepted.map(f=>{
        const otherId=f.user_id===currentUser.id?f.friend_id:f.user_id;
        const nick=friendProfiles[otherId]?.nickname||'…';
        return `<div class="f-item">
          <div class="f-avatar">${nick[0].toUpperCase()}</div>
          <div class="f-name">@${esc(nick)}</div>
          <div class="f-actions">
            <button class="f-btn f-btn-remove" onclick="declineOrRemoveFriend('${f.id}')">Remove</button>
          </div>
        </div>`;
      }).join('')}`;
  } else {
    friendsEl.innerHTML = !incoming.length
      ? '<div class="f-empty">No friends yet.<br>Search above to find someone!</div>' : '';
  }
  document.getElementById('friend-search-results').innerHTML='';
}

let searchTimer;
function onFriendSearch() {
  const q = document.getElementById('friend-search').value.trim();
  clearTimeout(searchTimer);
  if (!q) { renderFriendsSheet(); return; }
  searchTimer = setTimeout(()=>searchUsers(q), 350);
}

async function searchUsers(q) {
  const { data, error } = await sb.from('profiles')
    .select('id,nickname')
    .ilike('nickname', `%${q}%`)
    .neq('id', currentUser.id)
    .limit(20);
  if (error) { toast('Search failed'); return; }
  const users = data || [];

  if (!users.length) {
    document.getElementById('friend-search-results').innerHTML='<div class="f-empty">No users found.</div>';
    document.getElementById('pending-section').innerHTML='';
    document.getElementById('friends-list-section').innerHTML='';
    return;
  }

  document.getElementById('friend-search-results').innerHTML = users.map(u=>{
    const existing = allFriendships.find(f=>
      (f.user_id===currentUser.id&&f.friend_id===u.id)||
      (f.friend_id===currentUser.id&&f.user_id===u.id)
    );
    let btn;
    if (!existing) {
      btn=`<button class="f-btn f-btn-add" onclick="sendFriendRequest('${u.id}','${esc(u.nickname)}')">+ Add</button>`;
    } else if (existing.status==='accepted') {
      btn=`<span class="f-btn f-btn-sent">Friends ✓</span>`;
    } else if (existing.user_id===currentUser.id) {
      btn=`<span class="f-btn f-btn-sent">Sent</span>`;
    } else {
      btn=`<button class="f-btn f-btn-accept" onclick="acceptFriendRequest('${existing.id}')">Accept</button>`;
    }
    return `<div class="f-item">
      <div class="f-avatar">${u.nickname[0].toUpperCase()}</div>
      <div class="f-name">@${esc(u.nickname)}</div>
      <div class="f-actions">${btn}</div>
    </div>`;
  }).join('');
  document.getElementById('pending-section').innerHTML='';
  document.getElementById('friends-list-section').innerHTML='';
}

async function sendFriendRequest(userId, nickname) {
  const { data, error } = await sb.from('friendships').insert({
    user_id: currentUser.id, friend_id: userId, status: 'pending'
  }).select().single();
  if (error) { toast('Failed to send request'); return; }
  allFriendships.push(data);
  toast(`Request sent to @${nickname}`);
  onFriendSearch();
}

async function acceptFriendRequest(id) {
  const { error } = await sb.from('friendships').update({status:'accepted'}).eq('id',id);
  if (error) { toast('Failed to accept request'); return; }
  const f = allFriendships.find(x=>x.id===id);
  if (f) f.status='accepted';
  await loadSpots();
  updateFriendsBadge(); renderFriendsSheet();
  toast('Friend added!');
}

async function declineOrRemoveFriend(id) {
  const { error } = await sb.from('friendships').delete().eq('id',id);
  if (error) { toast('Failed'); return; }
  const wasAccepted = allFriendships.find(x=>x.id===id)?.status==='accepted';
  allFriendships = allFriendships.filter(x=>x.id!==id);
  if (wasAccepted) await loadSpots();
  updateFriendsBadge();
  const q = document.getElementById('friend-search').value.trim();
  q ? searchUsers(q) : renderFriendsSheet();
}

// ── DATA ─────────────────────────────────────────────────────
async function loadSpots() {
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  const { data, error } = await sb.from('spots').select('*').order('created_at',{ascending:true});
  if (error) { toast('Failed to load spots'); return; }
  spots=data||[];
  spots.forEach(s=>addMarker(s));
  updateCount(); renderList();
}

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('locating').classList.add('gone');
    showAuthScreen();
  } else {
    currentUser=session.user;
    document.getElementById('user-btn').title=`${currentUser.email} — click to sign out`;
    await loadFriendData();
    await loadSpots();
    initGPS();
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    if ((event==='SIGNED_IN'||event==='TOKEN_REFRESHED') && session) {
      currentUser=session.user;
      document.getElementById('user-btn').title=`${currentUser.email} — click to sign out`;
      hideAuthScreen();
      await loadFriendData();
      await loadSpots();
      if (!locMark) initGPS();
    } else if (event==='SIGNED_OUT') {
      currentUser=null;
      spots=[]; Object.values(markers).forEach(m=>map.removeLayer(m)); markers={};
      allFriendships=[]; friendProfiles={};
      updateFriendsBadge(); updateCount(); renderList();
      document.getElementById('locating').classList.add('gone');
      showAuthScreen();
    }
  });
}

init();
</script>
